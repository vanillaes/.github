name: JSR (JavsScript Registry) Release

on:
  workflow_call:

jobs:
  jsr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          cache: true
      - run: deno install
      - name: Publish
        if: ${{ hashFiles('jsr.json') != '' }}
        run: npx jsr publish
