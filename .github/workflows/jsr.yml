name: JSR (JavsScript Registry) Release

on:
  workflow_call:

jobs:
  jsr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Publish
        if: ${{ hashFiles('jsr.json') != '' }}
        run: npx jsr publish
