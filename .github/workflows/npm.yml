name: NPM Release

on:
  workflow_call:

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup
      uses: actions/setup-node@v6
      with:
        node-version: 24
        registry-url: 'https://registry.npmjs.org'
    - name: Dependencies
      run: npm ci
    - name: Publish
      run: npm publish --provenance --access public
